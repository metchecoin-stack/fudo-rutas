<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FUDO · Rutas Córdoba</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --fudo:#FF4D00;--bg:#0d0d0d;--surf:#181818;--card:#1f1f1f;--brd:#2a2a2a;
  --txt:#f0f0f0;--mut:#777;--mut2:#555;
  --activo:#22C55E;--baja:#EF4444;--perdida:#F97316;--pipeline:#A855F7;--nuevo:#3B82F6;
  --visitado:#FACC15;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#ll{font-size:34px;font-weight:900;color:var(--fudo);letter-spacing:-1.5px}
#lstats{display:flex;gap:18px}
.ls{text-align:center}.lsn{font-size:22px;font-weight:800}.lsl{font-size:10px;color:var(--mut);margin-top:2px}
#lbar{width:200px;height:2px;background:var(--brd);border-radius:2px;overflow:hidden}
#lfill{height:100%;background:var(--fudo);width:0;transition:width .35s ease}
#ltxt{font-size:11px;color:var(--mut)}
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg);border-bottom:1px solid var(--brd)}
#hrow1{display:flex;align-items:center;gap:8px;padding:9px 12px 6px}
#logo{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
#ldot{width:27px;height:27px;background:var(--fudo);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:12px;flex-shrink:0}
#ltitle{font-size:14px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
#lsub{font-size:9px;color:var(--mut)}
.hbtn{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--txt);cursor:pointer;white-space:nowrap;flex-shrink:0}
.hbtn.act{background:var(--fudo);border-color:var(--fudo);color:#fff}
#pcount{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:3px 9px;font-size:10px;color:var(--mut);flex-shrink:0}
#pcount b{color:var(--txt)}
#brow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 12px 7px}
#brow::-webkit-scrollbar{display:none}
.bb{flex-shrink:0;padding:4px 11px;border-radius:14px;border:1px solid var(--brd);background:var(--surf);color:var(--mut);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .12s}
.bb.on{background:var(--fudo);border-color:var(--fudo);color:#fff}
#frow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 12px 8px}
#frow::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;display:flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;border:none;font-size:10px;font-weight:700;cursor:pointer;opacity:.38;transition:all .12s}
.fb.on{opacity:1}
.fdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.f-a{background:rgba(34,197,94,.18);color:var(--activo)}.f-a.on{background:var(--activo);color:#fff}
.f-b{background:rgba(239,68,68,.18);color:var(--baja)}.f-b.on{background:var(--baja);color:#fff}
.f-p{background:rgba(249,115,22,.18);color:var(--perdida)}.f-p.on{background:var(--perdida);color:#fff}
.f-l{background:rgba(168,85,247,.18);color:var(--pipeline)}.f-l.on{background:var(--pipeline);color:#fff}
.f-n{background:rgba(59,130,246,.18);color:var(--nuevo)}.f-n.on{background:var(--nuevo);color:#fff}
.f-v{background:rgba(250,204,21,.18);color:#b45309}.f-v.on{background:var(--visitado);color:#000}
#map{position:fixed;top:136px;left:0;right:0;bottom:54px;z-index:1}
#bnav{position:fixed;bottom:0;left:0;right:0;height:54px;z-index:1000;background:var(--bg);border-top:1px solid var(--brd);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--mut);border:none;background:none;font-size:9px;transition:color .12s}
.nt.on{color:var(--fudo)}
.nt svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.panel{position:fixed;top:136px;left:0;right:0;bottom:54px;z-index:500;background:var(--bg);overflow-y:auto;display:none}
.panel.show{display:block}
#sbar{position:fixed;top:136px;left:0;right:0;z-index:600;background:var(--bg);padding:8px 12px;border-bottom:1px solid var(--brd);display:none}
#sbar.show{display:block}
#sinput{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;color:var(--txt);font-size:13px;outline:none;-webkit-appearance:none}
#sinput::placeholder{color:var(--mut)}
#lista-wrap{padding:8px 10px}
.li{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:9px 11px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:9px}
.li:active{opacity:.75}
.ldot2{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.linfo{flex:1;min-width:0}
.lname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.laddr{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lmeta{font-size:10px;color:var(--mut2);margin-top:2px}
.ltag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;flex-shrink:0}
#res-wrap{padding:10px 12px}
.rc{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px;margin-bottom:10px}
.rc h3{font-size:11px;color:var(--mut);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.rstat{background:var(--surf);border-radius:8px;padding:10px;text-align:center}
.rstat-n{font-size:24px;font-weight:800}.rstat-l{font-size:10px;color:var(--mut);margin-top:2px}
.rseg{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer}
.rsegdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rsegname{font-size:12px;flex:1}.rsegn{font-size:12px;font-weight:700}
.vitem{background:var(--surf);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.vname{font-size:12px;font-weight:600}.vcom{font-size:11px;color:var(--mut);font-style:italic;margin-top:2px}.vmeta{font-size:10px;color:var(--mut2);margin-top:3px}
#overlay{position:fixed;inset:0;z-index:1500;background:rgba(0,0,0,.5);display:none;backdrop-filter:blur(2px)}
#overlay.open{display:block}
#sheet{position:fixed;left:0;right:0;bottom:-100%;z-index:2000;background:var(--card);border-radius:18px 18px 0 0;border-top:1px solid var(--brd);transition:bottom .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px)}
#sheet.open{bottom:0}
#shandle{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto 4px}
#scontent{padding:0 16px 4px}
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:8px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.sname{font-size:17px;font-weight:800;line-height:1.2;margin-bottom:3px}
.saddr{font-size:12px;color:var(--mut);margin-bottom:9px;line-height:1.45}
.spills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.spill{background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:3px 8px;font-size:10px;color:var(--mut)}
.spill b{color:var(--txt)}
.smotivo{font-size:10px;color:var(--mut);padding:6px 9px;background:var(--surf);border-radius:8px;border-left:2px solid var(--brd);margin-bottom:8px}
.sowner{font-size:11px;color:var(--mut);margin-bottom:10px}
.btn-visit{width:100%;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .15s}
.btn-visit.unvisited{background:rgba(250,204,21,.15);color:#b45309;border:1.5px solid rgba(250,204,21,.4)}
.btn-visit.visited{background:var(--visitado);color:#000;border:1.5px solid var(--visitado)}
.sbtns{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.btn-nav{flex:1;min-width:100px;background:var(--fudo);color:#fff;border:none;border-radius:10px;padding:11px 8px;font-size:12px;font-weight:700;text-align:center;text-decoration:none;display:block;cursor:pointer}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:10px;padding:11px 12px;font-size:12px;font-weight:700;text-decoration:none;display:block}
.btn-sm{background:var(--surf);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:11px 12px;font-size:11px;text-decoration:none;display:block;font-weight:600;white-space:nowrap}
.csec{border-top:1px solid var(--brd);padding-top:12px}
.clabel{font-size:11px;color:var(--mut);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.prevcom{background:var(--surf);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:11px}
.prevcom-who{font-size:10px;color:var(--mut);margin-top:3px}
#cinput{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:8px 10px;color:var(--txt);font-size:12px;outline:none;resize:none;height:66px;margin-bottom:7px;-webkit-appearance:none}
#cinput::placeholder{color:var(--mut)}
#csave{width:100%;background:var(--surf);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:10px;font-size:12px;cursor:pointer;font-weight:600}
#csave.ok{background:var(--activo);border-color:var(--activo);color:#fff}
#addpanel{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);display:none;align-items:flex-end}
#addpanel.open{display:flex}
#addform{background:var(--card);border-radius:18px 18px 0 0;padding:20px 16px;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px)}
#addform h3{font-size:15px;font-weight:700;margin-bottom:14px}
.fi{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;outline:none;margin-bottom:8px;-webkit-appearance:none}
.fi::placeholder{color:var(--mut)}
#addsave{width:100%;background:var(--fudo);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
#addcancel{width:100%;background:transparent;color:var(--mut);border:none;border-radius:10px;padding:10px;font-size:12px;cursor:pointer;margin-top:6px}
.leaflet-popup-content-wrapper{background:var(--card)!important;border:1px solid var(--brd)!important;border-radius:12px!important;box-shadow:0 8px 28px rgba(0,0,0,.65)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;min-width:170px!important}
.leaflet-popup-tip-container{display:none!important}
.leaflet-popup-close-button{color:var(--mut)!important;top:8px!important;right:10px!important;font-size:17px!important}
.pmini{padding:10px 12px;cursor:pointer}
.pmini-tipo{font-size:9px;font-weight:800;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.pmini-name{font-size:13px;font-weight:700;padding-right:14px;line-height:1.2;margin-bottom:2px}
.pmini-addr{font-size:10px;color:var(--mut);margin-bottom:4px}
.pmini-more{font-size:10px;color:var(--fudo);font-weight:600}
.pmini-visited{font-size:10px;color:var(--visitado);margin-bottom:3px}
#fab-loc{position:fixed;bottom:70px;right:14px;z-index:900;width:46px;height:46px;border-radius:50%;background:var(--fudo);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,77,0,.45);transition:transform .15s,background .15s}
#fab-loc:active{transform:scale(.92)}
#fab-loc.tracking{background:var(--activo);box-shadow:0 4px 16px rgba(34,197,94,.45)}
#fab-loc svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:7px 16px;border-radius:20px;font-size:11px;z-index:5000;opacity:0;transition:opacity .22s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
</style>
</head>
<body>

<div id="loading">
  <div id="ll">FUDO</div>
  <div id="lstats">
    <div class="ls"><div class="lsn" id="lsb" style="color:var(--baja)">0</div><div class="lsl">Bajas</div></div>

<div id="hdr">

    <button class="bb" data-b="Alta Córdoba" onclick="setBarrio(this)">Alta Córdoba</button>
    <button class="bb" data-b="Alberdi" onclick="setBarrio(this)">Alberdi</button>
    <button class="bb" data-b="Cofico" onclick="setBarrio(this)">Cofico</button>

    <button class="bb" data-b="San Vicente" onclick="setBarrio(this)">San Vicente</button>
    <button class="bb" data-b="Jardín" onclick="setBarrio(this)">Jardín</button>
    <button class="bb" data-b="Villa Belgrano" onclick="setBarrio(this)">Villa Belgrano</button>
  </div>
  <div id="frow">
    <button class="fb f-a on" id="fa" onclick="togF('activo')"><div class="fdot"></div>Activos</button>
    <button class="fb f-b on" id="fb2" onclick="togF('baja')"><div class="fdot"></div>Bajas</button>
    <button class="fb f-p on" id="fp" onclick="togF('perdida')"><div class="fdot"></div>Pérdidas</button>
    <button class="fb f-l on" id="fl" onclick="togF('pipeline')"><div class="fdot"></div>En proceso</button>
    <button class="fb f-n on" id="fn" onclick="togF('nuevo')"><div class="fdot"></div>Nuevos</button>
    <button class="fb f-v" id="fv" onclick="togF('visitado')"><div class="fdot"></div>⭐ Visitados</button>
  </div>
</div>

<div id="map"></div>

<div id="sbar"><input id="sinput" type="search" placeholder="Buscar local o dirección..." oninput="doSearch(this.value)" autocomplete="off"/></div>
<div class="panel" id="plista"><div id="lista-wrap"></div></div>
<div class="panel" id="presumen"><div id="res-wrap"></div></div>

<div id="bnav">
  <button class="nt on" id="t-mapa" onclick="setTab('mapa')">
    <svg viewBox="0 0 24 24"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><path d="M9 4v13M15 7v13"/></svg>Mapa
  </button>
  <button class="nt" id="t-lista" onclick="setTab('lista')">
    <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Lista
  </button>
  <button class="nt" id="t-resumen" onclick="setTab('resumen')">
    <svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Resumen
  </button>
</div>

<div id="overlay" onclick="closeSheet()"></div>
<div id="sheet"><div id="shandle"></div><div id="scontent"></div></div>

<div id="addpanel">
  <div id="addform">
    <h3>Agregar local nuevo</h3>
    <input class="fi" id="an" placeholder="Nombre del local" autocomplete="off"/>
    <input class="fi" id="aa" placeholder="Dirección (ej: Belgrano 750, Güemes)" autocomplete="off"/>
    <input class="fi" id="at" placeholder="Teléfono / WhatsApp" type="tel" autocomplete="off"/>
    <input class="fi" id="ai" placeholder="Instagram (opcional)" autocomplete="off"/>
    <textarea class="fi" id="ac" placeholder="Comentario inicial" style="resize:none;height:56px"></textarea>
    <button id="addsave" onclick="saveLocal()">Guardar y poner en el mapa</button>
    <button id="addcancel" onclick="closeAdd()">Cancelar</button>
  </div>
</div>

<button id="fab-loc" onclick="toggleTracking()" title="Mi ubicación">

</button>

// ── ICONS ──
function mkNormalIcon(tipo) {
  const col = C[tipo] || '#888';
  return L.divIcon({
    html: '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">' +
          '<path d="M13 0C5.82 0 0 5.82 0 13c0 9.1 13 21 13 21s13-11.9 13-21C26 5.82 20.18 0 13 0z" fill="' + col + '" opacity=".93"/>' +
          '<circle cx="13" cy="13" r="5.5" fill="white" opacity=".88"/>' +
          '</svg>',
    className: '', iconSize: [26,34], iconAnchor: [13,34], popupAnchor: [0,-38]
  });
}

function mkVisitadoIcon(tipo) {
  const inner = C[tipo] || '#888';
  return L.divIcon({
    html: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">' +
          '<path d="M16 0C7.16 0 0 7.16 0 16c0 11.2 16 24 16 24s16-12.8 16-24C32 7.16 24.84 0 16 0z" fill="#FACC15" opacity=".97"/>' +
          '<circle cx="16" cy="16" r="8" fill="' + inner + '" opacity=".9"/>' +
          '<path d="M11 16l3.5 3.5L21 11" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>',
    className: '', iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-42]
  });
}

function mkIcon(tipo, visited) {
  return visited ? mkVisitadoIcon(tipo) : mkNormalIcon(tipo);
}

// ── BARRIO ──
function getBarrio(lat, lng) {
  if (!lat || !lng) return null;
  for (const [n, b] of Object.entries(BB)) {
    if (lat >= b[0] && lat <= b[1] && lng >= b[2] && lng <= b[3]) return n;
  }
  return null;
}

// ── POPUP MINI ──
function mkMini(d) {
  const v = visits[d.id];
  return '<div class="pmini" onclick="openSheet('' + d.id + '')">' +
    '<div class="pmini-tipo" style="color:' + (C[d.tipo]||'#888') + '">' + (LB[d.tipo]||d.tipo) + '</div>' +
    '<div class="pmini-name">' + d.name + '</div>' +
    (d.addr ? '<div class="pmini-addr">' + d.addr.substring(0,45) + (d.addr.length>45?'...':'') + '</div>' : '') +
    (v ? '<div class="pmini-visited">⭐ Visitado · ' + new Date(v.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + '</div>' : '') +
    '<div class="pmini-more">Ver detalles →</div>' +
    '</div>';
}

// ── ADD MARKER ──
function addMarker(d) {
  if (!d.lat || !d.lng) return;
  const m = L.marker([d.lat, d.lng], {icon: mkIcon(d.tipo, !!visits[d.id])});
  m.bindPopup(mkMini(d), {maxWidth:230, minWidth:185, autoPan:true});
  m.data = d;
  layers[d.tipo].addLayer(m);
  markers.push(m);
  updatePC();
}

function updatePC() {
  document.getElementById('pc').textContent = markers.length;
}

// ── REFRESH MARKER ICON ──
function refreshMarker(id) {
  const d = allData.find(r => String(r.id) === String(id));
  if (!d) return;
  const isVisited = !!visits[id];
  markers.forEach(m => {
    if (m.data && String(m.data.id) === String(id)) {
      m.setIcon(mkIcon(d.tipo, isVisited));
      m.setPopupContent(mkMini(d));
    }
  });
}

// ── TOGGLE VISITADO ──
async function toggleVisitado(id) {
  const d = allData.find(r => String(r.id) === String(id));
  if (!d) return;
  const wasVisited = !!visits[id];
  if (wasVisited) {
    delete visits[id];
    visitsList = visitsList.filter(v => v.id !== id);
  } else {
    const entry = {id: id, name: d.name, tipo: d.tipo, comentario: '', vendedor: VENDOR, fecha: new Date().toISOString()};
    visits[id] = entry;
    visitsList.unshift(entry);
  }
  try { localStorage.setItem(SK_V, JSON.stringify(visitsList)); } catch(e) {}
  try { await window.storage.set(SK_V, JSON.stringify(visitsList), true); } catch(e) {}

  // Refresh pin color immediately
  refreshMarker(id);

  // Refresh sheet
  openSheet(id);
  toast(visits[id] ? '⭐ Marcado como visitado' : 'Visita eliminada');
  renderResumen();
  if (tab === 'lista') renderLista();
}

// ── FILTERS ──
function togF(tipo) {
  if (tipo === 'visitado') {
    filters.visitado = !filters.visitado;
    document.getElementById('fv').classList.toggle('on', !!filters.visitado);
    renderLista();
    return;
  }
  filters[tipo] = !filters[tipo];
  document.getElementById(FIDS[tipo]).classList.toggle('on', !!filters[tipo]);
  if (filters[tipo]) map.addLayer(layers[tipo]);
  else map.removeLayer(layers[tipo]);
  updatePC();
  if (tab === 'lista') renderLista();
}

// ── BARRIO ──
function setBarrio(btn) {
  document.querySelectorAll('.bb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  barrio = btn.dataset.b;
  const c = BC[barrio] || BC.todos;
  map.flyTo([c[0], c[1]], c[2], {duration:.5, animate:true});
  if (tab === 'lista') renderLista();
}

// ── TAB ──
function setTab(t) {
  tab = t;
  document.querySelectorAll('.nt').forEach(b => b.classList.remove('on'));
  document.getElementById('t-'+t).classList.add('on');
  document.getElementById('plista').classList.remove('show');
  document.getElementById('presumen').classList.remove('show');
  document.getElementById('sbar').classList.remove('show');
  if (t === 'lista') {
    document.getElementById('plista').classList.add('show');
    document.getElementById('sbar').classList.add('show');
    renderLista();
  } else if (t === 'resumen') {
    document.getElementById('presumen').classList.add('show');
    renderResumen();
  }
}

// ── SEARCH ──
function toggleSearch() {
  sopen = !sopen;
  document.getElementById('sbtn').classList.toggle('act', sopen);
  if (sopen) { setTab('lista'); setTimeout(() => document.getElementById('sinput').focus(), 120); }
  else { document.getElementById('sinput').value = ''; renderLista(); }
}
function doSearch(q) { renderLista(q); }

// ── in barrio check ──
function inBarrio(d) {
  if (barrio === 'todos') return true;
  if (d.barrio && d.barrio === barrio) return true;
  if (d.lat && d.lng) { const b = getBarrio(d.lat, d.lng); if (b === barrio) return true; }
  return false;
}

// ── LISTA ──
function renderLista(q) {
  q = q || '';
  const ql = q.toLowerCase();
  const showOnlyVisited = !!filters.visitado;
  let items = allData.filter(d => {
    if (showOnlyVisited && !visits[d.id]) return false;
    if (!filters[d.tipo]) return false;
    if (!inBarrio(d)) return false;
    if (ql) return d.name.toLowerCase().includes(ql) || (d.addr||'').toLowerCase().includes(ql);
    return true;
  });
  items.sort((a,b) => {
    const va = visits[a.id]?1:0, vb = visits[b.id]?1:0;
    if (va !== vb) return vb - va;
    return (b.ventas||0) - (a.ventas||0);
  });
  const html = items.slice(0,300).map(d => {
    const v = visits[d.id];
    const vs = (d.ventas||0)>999 ? Math.round(d.ventas/1000)+'k tx' : (d.ventas||0)>0 ? d.ventas+' tx' : '';
    const bt = d.barrio && d.barrio !== 'Otro' ? d.barrio : '';
    const dotColor = v ? '#FACC15' : (C[d.tipo]||'#888');
    return '<div class="li" onclick="openSheet('' + d.id + '')">' +
      '<div class="ldot2" style="background:' + dotColor + '"></div>' +
      '<div class="linfo">' +
        '<div class="lname">' + d.name + '</div>' +
        '<div class="laddr">' + (d.addr||'Sin dirección') + '</div>' +
        '<div class="lmeta">' + [vs,bt].filter(Boolean).join(' · ') + '</div>' +
      '</div>' +
      (v ? '<div style="font-size:15px;flex-shrink:0">⭐</div>' : '') +
      '<div class="ltag" style="background:' + (C[d.tipo]||'#888') + '22;color:' + (C[d.tipo]||'#888') + '">' + (TIPOS[d.tipo]||d.tipo) + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('lista-wrap').innerHTML = html || '<div style="padding:24px;text-align:center;color:var(--mut);font-size:13px">Sin resultados</div>';
}

// ── OPEN SHEET ──
function openSheet(id) {
  const d = allData.find(r => String(r.id) === String(id));
  if (!d) return;
  curLocal = d;
  const nav = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent((d.addr||d.name)+', Córdoba, Argentina');
  const hs = (!String(d.id).startsWith('new_') && !String(d.id).startsWith('custom_')) ? 'https://app.hubspot.com/contacts/5096255/record/0-3/' + d.id : '';
  const ig = d.instagram && d.instagram.length > 5 ? d.instagram : '';
  const tel = d.telefono || '';
  const wa = tel ? 'https://wa.me/' + tel + '?text=Hola%2C+soy+de+FUDO+el+software+gastron%C3%B3mico+%F0%9F%9A%80+%C2%BFTienen+un+minuto%3F' : '';
  const vs = (d.ventas||0)>999 ? Math.round(d.ventas/1000)+'k tx' : (d.ventas||0)>0 ? d.ventas+' tx' : '';
  const v = visits[d.id];
  const isVisited = !!v;

  document.getElementById('scontent').innerHTML =
    '<div class="sbadge" style="background:' + (C[d.tipo]||'#888') + '22;color:' + (C[d.tipo]||'#888') + '">' + (LB[d.tipo]||d.tipo) + '</div>' +
    '<div class="sname">' + d.name + '</div>' +
    '<div class="saddr">' + (d.addr||'Sin dirección registrada') + '</div>' +
    (vs || d.plan ? '<div class="spills">' + (vs?'<div class="spill"><b>'+vs+'</b></div>':'') + (d.plan?'<div class="spill">Plan: <b>'+d.plan+'</b></div>':'') + '</div>' : '') +
    (d.motivo ? '<div class="smotivo">⚠️ ' + d.motivo + '</div>' : '') +
    (d.tipo==='pipeline' ? '<div class="smotivo">📋 En proceso con: ' + (d.owner||'—') + '</div>' : '') +
    (d.owner && d.tipo!=='pipeline' ? '<div class="sowner">👤 Último contacto: ' + d.owner + '</div>' : '') +
    '<button class="btn-visit ' + (isVisited?'visited':'unvisited') + '" onclick="toggleVisitado('' + d.id + '')">' +
      (isVisited ? '⭐ Visitado — tocar para desmarcar' : '☆ Marcar como visitado') +
    '</button>' +
    '<div class="sbtns">' +
      '<a class="btn-nav" href="' + nav + '" target="_blank">🧭 Cómo llegar</a>' +
      (wa ? '<a class="btn-wa" href="' + wa + '" target="_blank">WhatsApp</a>' :
      '<a class="btn-sm" style="color:#25D366;border-color:rgba(37,211,102,.3)" href="https://wa.me/?text=' + encodeURIComponent('Hola, soy de FUDO. Busco hablar con ' + d.name + ' en Córdoba.') + '" target="_blank">📞 WA (buscar)</a>') +
      (hs ? '<a class="btn-sm" href="' + hs + '" target="_blank">HubSpot</a>' : '') +
      (ig ? '<a class="btn-sm" href="' + ig + '" target="_blank">IG</a>' : '') +
    '</div>' +
    '<div class="csec">' +
      '<div class="clabel"><span>Comentario de visita</span>' +
        (v ? '<span style="color:var(--visitado);font-size:10px">✓ ' + new Date(v.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + '</span>' : '') +
      '</div>' +
      (v && v.comentario ? '<div class="prevcom">' + v.comentario + '<div class="prevcom-who">— ' + v.vendedor + ' · ' + new Date(v.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</div></div>' : '') +
      '<textarea id="cinput" placeholder="Ej: Interesado, hablar con Carlos el jueves...">' + (v&&v.comentario?v.comentario:'') + '</textarea>' +
      '<button id="csave" onclick="saveComment()">💾 Guardar comentario</button>' +
    '</div>';

  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  if (d.lat && d.lng) map.flyTo([d.lat, d.lng], 17, {duration:.5});
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  curLocal = null;
}

// ── SAVE COMMENT ──
async function saveComment() {
  const txt = document.getElementById('cinput').value.trim();
  if (!txt) { toast('Escribí un comentario primero'); return; }
  const d = curLocal; if (!d) return;
  const entry = {id: d.id, name: d.name, tipo: d.tipo, comentario: txt, vendedor: VENDOR, fecha: new Date().toISOString()};
  visits[d.id] = entry;
  visitsList = visitsList.filter(v => v.id !== d.id);
  visitsList.unshift(entry);
  try { localStorage.setItem(SK_V, JSON.stringify(visitsList)); } catch(e) {}
  try { await window.storage.set(SK_V, JSON.stringify(visitsList), true); } catch(e) {}
  const btn = document.getElementById('csave');
  btn.textContent = '✓ Guardado'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '💾 Guardar comentario'; btn.classList.remove('ok'); }, 2000);
  toast('Comentario guardado');
  refreshMarker(d.id);
  renderResumen();
}

// ── RESUMEN ──
function renderResumen() {
  const tot = visitsList.length;
  const byT = {baja:0, perdida:0, pipeline:0, nuevo:0, activo:0};
  visitsList.forEach(v => { if (byT[v.tipo] !== undefined) byT[v.tipo]++; });
  const topB = allData.filter(r => r.tipo==='baja').sort((a,b) => (b.ventas||0)-(a.ventas||0)).slice(0,10);
  document.getElementById('res-wrap').innerHTML =
    '<div class="rc"><h3>Resumen del viaje</h3>' +
      '<div class="rg">' +
        '<div class="rstat"><div class="rstat-n" style="color:var(--visitado)">' + tot + '</div><div class="rstat-l">Locales visitados</div></div>' +
        '<div class="rstat"><div class="rstat-n" style="color:var(--nuevo)">' + customs.length + '</div><div class="rstat-l">Nuevos agregados</div></div>' +
      '</div>' +
      [['baja',byT.baja],['perdida',byT.perdida],['pipeline',byT.pipeline],['nuevo',byT.nuevo]].map(([t,n]) =>
        '<div class="rseg"><div class="rsegdot" style="background:' + C[t] + '"></div><div class="rsegname">' + TIPOS[t] + 's visitados</div><div class="rsegn" style="color:' + C[t] + '">' + n + '</div></div>'
      ).join('') +
    '</div>' +
    (visitsList.length > 0 ?
      '<div class="rc"><h3>Últimas visitas</h3>' +
        visitsList.slice(0,10).map(v =>
          '<div class="vitem"><div class="vname" style="color:' + (C[v.tipo]||'var(--txt)') + '">' + v.name + '</div>' +
          '<div class="vcom">' + (v.comentario||'(sin comentario)') + '</div>' +
          '<div class="vmeta">' + v.vendedor + ' · ' + new Date(v.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</div></div>'
        ).join('') +
      '</div>' : '') +
    '<div class="rc"><h3>🔥 Top 10 bajas por volumen</h3>' +
      topB.map((r,i) =>
        '<div class="rseg" onclick="openSheet(\'' + r.id + '\')">' +
        '<div style="font-size:11px;color:var(--mut);width:16px;flex-shrink:0">' + (i+1) + '</div>' +
        '<div class="rsegdot" style="background:' + C.baja + '"></div>' +
        '<div class="rsegname" style="font-size:12px">' + r.name + '</div>' +
        '<div class="rsegn" style="font-size:11px;color:var(--mut)">' + ((r.ventas||0)>999?Math.round(r.ventas/1000)+'k':r.ventas) + ' tx</div>' +
        (visits[r.id] ? '<span style="font-size:14px;margin-left:4px">⭐</span>' : '') +
        '</div>'
      ).join('') +
    '</div>' +
    (visitsList.length > 0 ?
      '<div class="rc"><h3>📋 Reporte de visitas y comentarios</h3>' +
        visitsList.slice(0,20).map(v =>
          '<div class="vitem">' +
          '<div class="vname" style="color:' + (C[v.tipo]||'var(--txt)') + '">' + v.name +
            ' <span style="font-size:9px;background:' + (C[v.tipo]||'#888') + '22;color:' + (C[v.tipo]||'#888') + ';padding:1px 5px;border-radius:6px">' + (TIPOS[v.tipo]||v.tipo) + '</span>' +
          '</div>' +
          '<div class="vcom">' + (v.comentario || '(sin comentario)') + '</div>' +
          '<div class="vmeta">' + v.vendedor + ' · ' + new Date(v.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</div>' +
          '</div>'
        ).join('') +
      '</div>' : '') +
        (customs.length > 0 ?
      '<div class="rc"><h3>Locales agregados en campo</h3>' +
        customs.map(r =>
          '<div class="vitem"><div class="vname">' + r.name + '</div>' +
          '<div class="vcom">' + (r.addr||'') + '</div>' +
          (r.comentario ? '<div class="vcom">' + r.comentario + '</div>' : '') +
          '<div class="vmeta">' + r.vendedor + ' · ' + new Date(r.fecha).toLocaleDateString('es-AR') + '</div></div>'
        ).join('') +
      '</div>' : '');
}

// ── ADD LOCAL ──
function openAdd() { document.getElementById('addpanel').classList.add('open'); }
function closeAdd() { document.getElementById('addpanel').classList.remove('open'); }

async function saveLocal() {
  const name = document.getElementById('an').value.trim();
  const addr = document.getElementById('aa').value.trim();
  const tel = document.getElementById('at').value.trim();
  const ig = document.getElementById('ai').value.trim();
  const com = document.getElementById('ac').value.trim();
  if (!name) { toast('Ingresá el nombre del local'); return; }
  document.getElementById('addsave').textContent = 'Guardando...';
  const id = 'custom_' + Date.now();
  const entry = {id, name, addr, tipo:'nuevo', ventas:0, plan:'', motivo:null, owner:VENDOR, instagram:ig, telefono:tel.replace(/\D/g,''), lat:null, lng:null, barrio:null, vendedor:VENDOR, fecha:new Date().toISOString(), comentario:com};
  allData.push(entry); customs.push(entry);
  if (entry.lat && entry.lng) addMarker(entry);
  if (com) { const ve={id,name,tipo:'nuevo',comentario:com,vendedor:VENDOR,fecha:entry.fecha}; visits[id]=ve; visitsList.unshift(ve); }
  try { localStorage.setItem(SK_C, JSON.stringify(customs)); } catch(e) {}
  try { await window.storage.set(SK_C, JSON.stringify(customs), true); } catch(e) {}
  closeAdd();
  toast('✅ ' + name + ' agregado');
  ['an','aa','at','ai','ac'].forEach(i2 => document.getElementById(i2).value = '');
  document.getElementById('addsave').textContent = 'Guardar y poner en el mapa';
  renderLista(); renderResumen();
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', 3000);
}

// ── GEOLOCATION ──
function toggleTracking() {
  if (!navigator.geolocation) { toast('GPS no disponible'); return; }
  trackingOn ? stopTracking() : startTracking();
}
function startTracking() {
  trackingOn = true;
  document.getElementById('fab-loc').classList.add('tracking');
  toast('📍 Ubicación activada');
  navigator.geolocation.getCurrentPosition(updateMyPosition, () => { toast('No se pudo obtener ubicación'); stopTracking(); }, {enableHighAccuracy:true, timeout:10000});
  watchId = navigator.geolocation.watchPosition(updateMyPosition, () => {}, {enableHighAccuracy:true, maximumAge:5000, timeout:10000});
}
function stopTracking() {
  trackingOn = false;
  document.getElementById('fab-loc').classList.remove('tracking');
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (myMarker) { map.removeLayer(myMarker); myMarker = null; }
  if (myCircle) { map.removeLayer(myCircle); myCircle = null; }
  toast('Ubicación desactivada');
}
function updateMyPosition(pos) {
  const lat=pos.coords.latitude, lng=pos.coords.longitude, acc=pos.coords.accuracy;
  if (myMarker) map.removeLayer(myMarker);
  if (myCircle) map.removeLayer(myCircle);
  myCircle = L.circle([lat,lng], {radius:acc, color:'#FF4D00', fillColor:'#FF4D00', fillOpacity:.08, weight:1, dashArray:'4 4'}).addTo(map);
  const myIcon = L.divIcon({html:'<div style="width:16px;height:16px;background:#FF4D00;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>', className:'', iconSize:[16,16], iconAnchor:[8,8]});
  myMarker = L.marker([lat,lng], {icon:myIcon, zIndexOffset:1000}).addTo(map);
  myMarker.bindPopup('<div style="padding:8px 10px;font-size:12px;font-weight:600">📍 Tu ubicación<br><span style="font-size:10px;color:#888">Precisión: '+Math.round(acc)+'m</span></div>');
  if (trackingOn) map.setView([lat,lng], Math.max(map.getZoom(), 16), {animate:true});
}

// ── LOAD STORED ──
async function loadStored() {
  try { const lv=localStorage.getItem(SK_V); if(lv){visitsList=JSON.parse(lv);visitsList.forEach(v=>visits[v.id]=v);} } catch(e) {}
  try { const lc=localStorage.getItem(SK_C); if(lc){customs=JSON.parse(lc);} } catch(e) {}
  try { const sv=await window.storage.get(SK_V,true); if(sv){const sh=JSON.parse(sv.value)||[];sh.forEach(v=>{if(!visits[v.id]){visits[v.id]=v;visitsList.push(v);}});visitsList.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));} } catch(e) {}
  try { const sc=await window.storage.get(SK_C,true); if(sc){const sh=JSON.parse(sc.value)||[];sh.forEach(c=>{if(!customs.find(x=>x.id===c.id))customs.push(c);});} } catch(e) {}
}

// ── MAIN ──
async function main() {
  setP(10, 'Iniciando mapa...');
  map = L.map('map', {center:[-31.42,-64.188], zoom:13, zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {attribution:'© CARTO', maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  ['activo','baja','perdida','pipeline','nuevo'].forEach(t => { layers[t] = L.layerGroup().addTo(map); });

  setP(20, 'Cargando datos...');
  await loadStored();

  setP(40, 'Procesando...');
  const D = FUDO_DATA;
  const segMap = {activos:'activo', bajas:'baja', perdidas:'perdida', pipeline:'pipeline', nuevos:'nuevo'};
  for (const [key, tipo] of Object.entries(segMap)) {
    (D[key]||[]).forEach(r => {
      r.tipo = tipo;
      r.barrio = getBarrio(r.lat, r.lng) || 'Otro';
      allData.push(r);
      if (r.lat && r.lng) addMarker(r);
    });
  }

  customs.forEach(r => { if (!allData.find(x=>x.id===r.id)) { allData.push(r); if(r.lat&&r.lng) addMarker(r); } });

  document.getElementById('lsb').textContent = D.bajas.length;
  document.getElementById('lsp').textContent = D.perdidas.length;
  document.getElementById('lsl2').textContent = D.pipeline.length;
  document.getElementById('lsn').textContent = D.nuevos.length;

  setP(100, '¡Listo!');
  await new Promise(r => setTimeout(r, 450));
  document.getElementById('loading').style.display = 'none';
}

function setP(p, msg) {
  document.getElementById('lfill').style.width = p + '%';
  document.getElementById('ltxt').textContent = msg;
}

main();
</script>
